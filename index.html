<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bad Dreems — Ultra Dundee 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=Instrument+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

<!-- FullCalendar core + plugins (globals) -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ical.js@1.5.0/build/ical.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@fullcalendar/icalendar@6.1.11/index.global.min.js"></script>

<style>
  :root {
    --chrome:    #54524d;
    --chrome2:   #4a4845;
    --chrome3:   #5e5c58;
    --border:    #666460;
    --page:      #f0ece5;
    --fg:        #e8e4dc;
    --fg2:       #d0ccc4;
    --fg3:       #5a5852;
    --fg-mid:    #d0ccc4;
    --fg-dim:    #ccc8c0;
    --adl:       #d4a843;
    --adl-bg:    #5a4e20;
    --adl-bdr:   #6e6030;
    --mel:       #6b9fd4;
    --mel-bg:    #2a3e58;
    --mel-bdr:   #344e6e;
    --syd:       #b06bc4;
    --syd-bg:    #462254;
    --syd-bdr:   #582a68;
    --bne:       #7ab86e;
    --bne-bg:    #264e24;
    --bne-bdr:   #306030;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; background: #111110; }

  body {
    background: var(--page);
    color: var(--fg);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── STICKY CHROME ── */
  .sticky-shell {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #111110;
  }

  .header {
    padding: 14px 20px;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .header-title {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 22px;
    color: var(--fg);
    letter-spacing: -0.02em;
  }

  .header-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--fg3);
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  .header-date {
    margin-left: auto;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--fg3);
  }

  .nav {
    display: flex;
    background: #1a1a18;
    border-bottom: 1px solid #2e2e2a;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .nav::-webkit-scrollbar { display: none; }

  .nav-tab {
    flex-shrink: 0;
    padding: 14px 22px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--fg3);
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }

  .nav-tab.active { color: var(--fg); border-bottom-color: var(--adl); }

  /* ── SECTIONS ── */
  .section { display: none; }
  .section.active { display: block; }

  /* ── CALENDAR ── */
  .cal-wrap { padding: 16px; }

  #calendar {
    --fc-border-color: var(--border);
    --fc-page-bg-color: var(--page);
    --fc-neutral-bg-color: var(--chrome);
    --fc-list-event-hover-bg-color: var(--chrome2);
    --fc-today-bg-color: rgba(212,168,67,0.08);
    --fc-event-border-color: transparent;
    --fc-button-bg-color: var(--chrome);
    --fc-button-border-color: var(--border);
    --fc-button-hover-bg-color: var(--chrome2);
    --fc-button-active-bg-color: var(--adl);
    --fc-button-text-color: var(--fg);
  }

  .fc { font-family: 'Instrument Sans', sans-serif; font-size: 13px; color: var(--fg); }
  .fc .fc-toolbar-title { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--chrome); }
  .fc .fc-col-header-cell-cushion,
  .fc .fc-daygrid-day-number { color: var(--fg2); font-size: 12px; font-family: 'IBM Plex Mono', monospace; }
  .fc .fc-daygrid-day.fc-day-today .fc-daygrid-day-number {
    background: var(--adl); color: var(--chrome); border-radius: 50%;
    width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-weight: 600;
  }
  .fc .fc-button {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase; border-radius: 3px; padding: 6px 10px;
  }
  .fc-event { border-radius: 3px !important; font-size: 11px !important; font-weight: 600 !important; font-family: 'IBM Plex Mono', monospace !important; padding: 1px 4px !important; }
  .fc-list-event-title a { color: var(--fg) !important; font-size: 13px; }
  .fc-list-event-time { color: var(--fg-dim) !important; font-family: 'IBM Plex Mono', monospace !important; font-size: 11px !important; }
  .fc-list-day-cushion { background: var(--chrome2) !important; font-family: 'IBM Plex Mono', monospace !important; font-size: 10px !important; letter-spacing: 0.1em !important; text-transform: uppercase !important; color: var(--fg-dim) !important; }
  .fc-list-day-side-text { color: var(--fg-dim) !important; font-family: 'IBM Plex Mono', monospace !important; }

  .cal-loading {
    background: var(--chrome);
    border-radius: 7px;
    text-align: center;
    padding: 40px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--fg-dim);
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }

  /* ── SHOWS ── */
  .shows-wrap { padding: 12px 16px; }
  .city-group { margin-bottom: 28px; }

  .city-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .city-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .city-name { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.06em; }

  .city-Adelaide  { --c: var(--adl); --cbg: var(--adl-bg); --cbdr: var(--adl-bdr); }
  .city-Melbourne { --c: var(--mel); --cbg: var(--mel-bg); --cbdr: var(--mel-bdr); }
  .city-Sydney    { --c: var(--syd); --cbg: var(--syd-bg); --cbdr: var(--syd-bdr); }
  .city-Brisbane  { --c: var(--bne); --cbg: var(--bne-bg); --cbdr: var(--bne-bdr); }

  .city-dot  { background: var(--c, var(--fg3)); }
  .city-name { color: var(--c, var(--fg)); }

  .show-card {
    background: var(--cbg, var(--chrome));
    border-radius: 7px;
    border-left: 3px solid var(--c, var(--border));
    margin-bottom: 8px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2), 0 1px 2px rgba(0,0,0,0.14);
    cursor: pointer;
  }

  .show-card-header { padding: 14px 14px 10px; display: flex; align-items: flex-start; gap: 10px; }
  .show-card:active .show-card-header { filter: brightness(1.1); }

  .show-tap-hint {
    display: flex; align-items: center; justify-content: center;
    padding: 0 14px 10px; gap: 4px;
    font-family: 'IBM Plex Mono', monospace; font-size: 9px;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--c, var(--fg-dim)); opacity: 0.5;
  }

  .show-card.open .show-tap-hint { display: none; }

  .show-date {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    color: var(--fg-dim); flex-shrink: 0; padding-top: 3px; min-width: 68px;
  }

  .show-main { flex: 1; min-width: 0; }

  .show-name {
    font-size: 16px; font-weight: 700; color: var(--fg);
    margin-bottom: 5px; line-height: 1.25;
  }

  .show-meta { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }

  .pill {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    padding: 2px 7px; border-radius: 3px;
    background: var(--chrome3); color: var(--fg-dim);
  }

  .pill-city {
    background: transparent;
    color: var(--c, var(--fg3));
    border: 1px solid var(--c, var(--fg3));
    opacity: 0.8;
  }

  .show-chevron {
    color: var(--c, var(--fg-dim)); font-size: 18px; flex-shrink: 0;
    transition: transform 0.2s; opacity: 0.6;
  }

  .show-card.open .show-chevron { transform: rotate(90deg); opacity: 1; }

  .show-detail {
    display: none;
    border-top: 1px solid var(--cbdr, var(--border));
    padding: 14px 14px 16px;
  }

  .show-card.open .show-detail { display: block; }

  .times-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 6px; margin-bottom: 14px;
  }

  @media (min-width: 480px) { .times-grid { grid-template-columns: repeat(4, 1fr); } }

  .time-cell { background: var(--chrome3); border-radius: 5px; padding: 9px 11px; }
  .time-label {
    font-family: 'IBM Plex Mono', monospace; font-size: 9px;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-dim); margin-bottom: 3px;
  }
  .time-value { font-size: 14px; font-weight: 700; color: var(--fg); }
  .time-value.tbc { color: var(--fg3); font-weight: 400; font-size: 13px; }

  .detail-section { margin-top: 12px; }
  .detail-label {
    font-family: 'IBM Plex Mono', monospace; font-size: 9px;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-dim); margin-bottom: 4px;
  }
  .detail-value { font-size: 13px; color: var(--fg2); line-height: 1.55; }

  .map-link {
    display: inline-flex; align-items: center; gap: 5px;
    font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    color: var(--c, var(--adl)); text-decoration: none;
    margin-top: 6px; padding: 5px 10px;
    border: 1px solid currentColor; border-radius: 3px;
    opacity: 0.8; transition: opacity 0.15s;
  }
  .map-link:active { opacity: 1; }
  .supports-list { font-size: 13px; color: var(--fg2); }

  /* ── CONTACTS ── */
  .contacts-wrap { padding: 12px 16px; }

  .section-title {
    font-family: 'IBM Plex Mono', monospace; font-size: 9px;
    text-transform: uppercase; letter-spacing: 0.12em; color: var(--fg3);
    padding: 18px 16px 8px;
    position: sticky; top: 89px; background: var(--page); z-index: 10;
  }

  .contact-card {
    background: var(--chrome); border-radius: 7px;
    margin-bottom: 8px; overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2), 0 1px 2px rgba(0,0,0,0.14);
    cursor: pointer;
  }

  .contact-card-header {
    padding: 13px 14px;
    display: flex; gap: 12px; align-items: center;
  }

  .contact-card:active .contact-card-header { filter: brightness(1.1); }

  .contact-detail {
    display: none;
    border-top: 1px solid var(--border);
    padding: 12px 14px 14px 64px;
  }

  .contact-card.open .contact-detail { display: block; }

  .contact-chevron {
    margin-left: auto;
    color: var(--fg-dim); font-size: 18px; flex-shrink: 0;
    transition: transform 0.2s; opacity: 0.5;
  }

  .contact-card.open .contact-chevron { transform: rotate(90deg); opacity: 1; }

  .contact-avatar {
    width: 38px; height: 38px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 600;
    letter-spacing: 0.05em; flex-shrink: 0; border: 1.5px solid transparent;
  }

  .contact-info { flex: 1; min-width: 0; }
  .contact-name { font-size: 14px; font-weight: 600; color: var(--fg); }
  .contact-role { font-size: 12px; color: var(--fg-dim); margin-top: 1px; }
  .contact-links { display: flex; flex-direction: column; gap: 6px; }
  .contact-link { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--fg-mid); text-decoration: none; }
  .contact-link:active { color: var(--fg); }

  /* ── DOCS ── */
  .docs-wrap { padding: 12px 16px; }

  .docs-empty {
    background: var(--chrome); border-radius: 7px;
    text-align: center; padding: 48px 20px;
    font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    color: var(--fg-dim); line-height: 2;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .docs-empty strong { color: var(--fg2); display: block; font-size: 13px; margin-bottom: 6px; }

  .doc-type-group { margin-bottom: 24px; }
  .doc-type-label {
    font-family: 'IBM Plex Mono', monospace; font-size: 9px;
    text-transform: uppercase; letter-spacing: 0.12em; color: var(--fg-dim);
    margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }

  .doc-row {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 13px; background: var(--chrome); border-radius: 6px;
    margin-bottom: 6px; text-decoration: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    transition: filter 0.12s;
  }
  .doc-row:active { filter: brightness(1.1); }
  .doc-icon { width: 34px; height: 34px; border-radius: 5px; background: var(--chrome3); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .doc-info { flex: 1; min-width: 0; }
  .doc-name { font-size: 13px; font-weight: 600; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .doc-meta { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--fg-dim); margin-top: 2px; }
  .doc-arrow { color: var(--fg-dim); font-size: 14px; flex-shrink: 0; }
  .doc-row.no-file { cursor: default; }
  .doc-row.no-file .doc-arrow { opacity: 0; }

  /* ── RESPONSIVE ── */
  @media (min-width: 640px) {
    .header { padding: 16px 28px; }
    .shows-wrap, .contacts-wrap, .cal-wrap, .docs-wrap { padding: 20px 28px; }
    .section-title { padding: 20px 28px 8px; top: 93px; }
  }

  @media (min-width: 960px) {
    body { max-width: 820px; margin: 0 auto; }
    html { background: #111110; }
  }

  /* Non-show day types get desaturated city tint */
  .show-card.type-muted .show-name     { color: var(--fg-mid); }
  .show-card.type-muted .show-chevron  { opacity: 0.4; }
</style>
</head>
<body>

<div class="sticky-shell">
  <header class="header">
    <span class="header-title">Bad Dreems</span>
    <span class="header-sub">Ultra Dundee 2026</span>
    <span class="header-date">Apr – May</span>
  </header>
  <nav class="nav">
    <button class="nav-tab active" data-tab="calendar">Calendar</button>
    <button class="nav-tab" data-tab="shows">Schedule</button>
    <button class="nav-tab" data-tab="contacts">Contacts</button>
    <button class="nav-tab" data-tab="docs">Docs</button>
  </nav>
</div>

<!-- CALENDAR -->
<div id="calendar-section" class="section active">
  <div class="cal-wrap">
    <div class="cal-loading" id="cal-loading">Loading calendar…</div>
    <div id="calendar" style="display:none"></div>
  </div>
</div>

<!-- SHOWS -->
<div id="shows-section" class="section">
  <div class="shows-wrap" id="shows-container">
    <div class="cal-loading" id="shows-loading">Loading schedule…</div>
  </div>
</div>

<!-- CONTACTS -->
<div id="contacts-section" class="section">
  <div id="contacts-container">
    <div class="cal-loading" id="contacts-loading">Loading contacts…</div>
  </div>
</div>

<!-- DOCS -->
<div id="docs-section" class="section">
  <div class="docs-wrap" id="docs-container">
    <div class="docs-empty" id="docs-loading">
      <strong>No documents yet</strong>
      Stage plots, tech riders, and other files<br>added by your TM will appear here.
    </div>
  </div>
</div>

<script>
// ── TABS ──
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.tab + '-section').classList.add('active');
  });
});

// ── SHOW CARDS ──
function toggleCard(card) { card.classList.toggle('open'); }
function toggleContact(card) { card.classList.toggle('open'); }

// ── CALENDAR ──
const ICAL_WORKER_URL = 'https://ical-proxy.amcf.workers.dev';
const CITY_COLORS = { Adelaide:'#d4a843', Melbourne:'#6b9fd4', Sydney:'#b06bc4', Brisbane:'#7ab86e' };

function guessColor(title) {
  for (const [city, color] of Object.entries(CITY_COLORS)) {
    if (title.includes(city)) return color;
  }
  if (/rehearsal/i.test(title)) return '#d4a843';
  if (/festival|gather sounds/i.test(title)) return '#b06bc4';
  if (/travel|flight|→/i.test(title)) return '#5a5852';
  if (/promo|interview|release/i.test(title)) return '#7ab86e';
  return '#6b9fd4';
}

async function loadCalendar() {
  const calEl = document.getElementById('calendar');
  const loading = document.getElementById('cal-loading');
  const isMobile = window.innerWidth < 640;

  if (!window.ICAL) {
    loading.textContent = 'Calendar error: ICAL library failed to load.';
    loading.style.display = 'block';
    calEl.style.display = 'none';
    return;
  }

  const cal = new FullCalendar.Calendar(calEl, {
    plugins: [FullCalendarDayGrid, FullCalendarList, FullCalendarICalendar],
    initialView: isMobile ? 'listMonth' : 'dayGridMonth',
    initialDate: '2026-04-01',
    headerToolbar: {
      left: 'prev,next',
      center: 'title',
      right: isMobile ? 'listMonth,dayGridMonth' : 'dayGridMonth,listMonth'
    },
    buttonText: {
      dayGridMonth: 'Grid',
      listMonth: 'List'
    },
    height: 'auto',
    firstDay: 1,
    displayEventTime: false,
    noEventsText: 'No events this period.',
    loading: (isLoading) => {
      loading.style.display = isLoading ? 'block' : 'none';
      calEl.style.display = isLoading ? 'none' : 'block';
    },
    eventDidMount: (info) => {
      const color = guessColor(info.event.title);
      info.el.style.backgroundColor = color + '22';
      info.el.style.borderLeft = `3px solid ${color}`;
      info.el.style.color = color;
    },
    events: {
      url: ICAL_WORKER_URL,
      format: 'ics',
      failure: () => {
        loading.textContent = 'Calendar unavailable — will load when deployed.';
        loading.style.display = 'block';
      }
    }
  });
  cal.render();
}
loadCalendar();

// ── DOCS ──
const BASEROW_TOKEN = 'Qu3ab715EJKly2rFhGJagUzPbbIqOYKl';
const DOCS_TABLE = 873338;
const DOC_ICONS = {
  'Stage plot':'🎭','Input list':'🎛','Hospitality rider':'🍽','Tech rider':'⚙️',
  'Contract':'📄','Settlement':'💰','Insurance':'🛡','Visa':'🗂','Carnet':'📦',
  'Rooming list':'🛏','Equipment list':'🎸','Advance':'📋','Other':'📎'
};
const TYPE_ORDER = [
  'Stage plot','Input list','Tech rider','Hospitality rider','Advance',
  'Contract','Settlement','Rooming list','Equipment list','Insurance','Carnet','Visa','Other'
];

async function loadDocs() {
  const container = document.getElementById('docs-container');
  const loading = document.getElementById('docs-loading');
  try {
    const res = await fetch(
      `https://api.baserow.io/api/database/rows/table/${DOCS_TABLE}/?user_field_names=true&size=100`,
      { headers: { Authorization: `Token ${BASEROW_TOKEN}` } }
    );
    const data = await res.json();
    const docs = data.results || [];
    if (docs.length === 0) return;

    const groups = {};
    docs.forEach(doc => {
      const type = doc['Type']?.value || 'Other';
      if (!groups[type]) groups[type] = [];
      groups[type].push(doc);
    });

    loading.remove();

    [...new Set([...TYPE_ORDER, ...Object.keys(groups)])]
      .filter(t => groups[t])
      .forEach(type => {
        const group = document.createElement('div');
        group.className = 'doc-type-group';
        group.innerHTML = `<div class="doc-type-label">${type}</div>`;

        groups[type].forEach(doc => {
          const fileUrl = (doc['File'] || [])[0]?.url || null;
          const meta = [
            doc['Version'] ? `v${doc['Version']}` : '',
            doc['Linked day']?.[0]?.value || ''
          ].filter(Boolean).join(' · ');

          const row = document.createElement(fileUrl ? 'a' : 'div');
          row.className = 'doc-row' + (fileUrl ? '' : ' no-file');
          if (fileUrl) {
            row.href = fileUrl;
            row.target = '_blank';
            row.rel = 'noopener';
          }

          row.innerHTML = `
            <div class="doc-icon">${DOC_ICONS[type]||'📎'}</div>
            <div class="doc-info">
              <div class="doc-name">${doc['Document name']||'Untitled'}</div>
              ${meta ? `<div class="doc-meta">${meta}</div>` : ''}
            </div>
            <span class="doc-arrow">${fileUrl ? '↗' : ''}</span>
          `;
          group.appendChild(row);
        });

        container.appendChild(group);
      });
  } catch (e) {
    loading.innerHTML = '<strong>Could not load documents</strong>Check your connection.';
  }
}

let docsLoaded = false;
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    if (tab.dataset.tab === 'docs' && !docsLoaded) {
      docsLoaded = true;
      loadDocs();
    }
  });
});

// ── SHOWS & CONTACTS ──
const TOUR_DAYS_TABLE = 873330;
const VENUES_TABLE = 873328;
const PEOPLE_TABLE = 873326;

function formatDate(dateStr) {
  const date = new Date(dateStr);
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${days[date.getDay()]} ${date.getDate()} ${months[date.getMonth()]}`;
}

function getCityColorVars(city) {
  switch(city) {
    case 'Adelaide': return { c: 'var(--adl)', cbg: 'var(--adl-bg)', cbdr: 'var(--adl-bdr)' };
    case 'Melbourne': return { c: 'var(--mel)', cbg: 'var(--mel-bg)', cbdr: 'var(--mel-bdr)' };
    case 'Sydney': return { c: 'var(--syd)', cbg: 'var(--syd-bg)', cbdr: 'var(--syd-bdr)' };
    case 'Brisbane': return { c: 'var(--bne)', cbg: 'var(--bne-bg)', cbdr: 'var(--bne-bdr)' };
    default: return { c: 'var(--fg3)', cbg: 'var(--chrome)', cbdr: 'var(--border)' };
  }
}

function renderTimeCell(label, value) {
  if (!value || value === 'TBC') {
    return `
      <div class="time-cell">
        <div class="time-label">${label}</div>
        <div class="time-value tbc">TBC</div>
      </div>
    `;
  }
  return `
    <div class="time-cell">
      <div class="time-label">${label}</div>
      <div class="time-value">${value}</div>
    </div>
  `;
}

async function loadShowsAndContacts() {
  const [tourDaysRes, venuesRes, peopleRes] = await Promise.all([
    fetch(
      `https://api.baserow.io/api/database/rows/table/${TOUR_DAYS_TABLE}/?user_field_names=true&size=100`,
      { headers: { Authorization: `Token ${BASEROW_TOKEN}` } }
    ),
    fetch(
      `https://api.baserow.io/api/database/rows/table/${VENUES_TABLE}/?user_field_names=true&size=100`,
      { headers: { Authorization: `Token ${BASEROW_TOKEN}` } }
    ),
    fetch(
      `https://api.baserow.io/api/database/rows/table/${PEOPLE_TABLE}/?user_field_names=true&size=100`,
      { headers: { Authorization: `Token ${BASEROW_TOKEN}` } }
    )
  ]);

  const [tourDaysData, venuesData, peopleData] = await Promise.all([
    tourDaysRes.ok ? tourDaysRes.json().catch(() => null) : null,
    venuesRes.ok ? venuesRes.json().catch(() => null) : null,
    peopleRes.ok ? peopleRes.json().catch(() => null) : null
  ]);

  if (!tourDaysRes.ok) console.warn('Tour Days table auth error:', tourDaysRes.status);
  if (!venuesRes.ok) console.warn('Venues table auth error:', venuesRes.status);
  if (!peopleRes.ok) console.warn('People table auth error:', peopleRes.status);

  const tourDays = tourDaysData?.results || [];
  const venues = venuesData?.results || [];
  const people = peopleData?.results || [];

  const venueMap = {};
  venues.forEach(v => {
    venueMap[v.id] = {
      name: v.Name,
      address: v.Address,
      mapsLink: v['Google Maps link'],
      contactName: v['Production contact name'],
      contactPhone: v['Production contact phone'],
      contactEmail: v['Production contact email']
    };
  });

  const venueCityMap = {};
  tourDays.forEach(td => {
    if (td.Venue && td.Venue[0] && td.City) {
      const venueId = td.Venue[0].id;
      if (!venueCityMap[venueId]) venueCityMap[venueId] = td.City;
    }
  });

  // ── RENDER SHOWS ──
  const showsContainer = document.getElementById('shows-container');
  const showsLoading = document.getElementById('shows-loading');
  showsLoading.remove();

  const cityGroups = {};
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  tourDays.forEach(td => {
    const city = td.City;
    if (!city) return;
    if (!cityGroups[city]) cityGroups[city] = { upcoming: [], past: [] };

    const showDate = new Date(td.Date);
    showDate.setHours(0, 0, 0, 0);
    const isPast = showDate < today;

    if (isPast) {
      cityGroups[city].past.push(td);
    } else {
      cityGroups[city].upcoming.push(td);
    }
  });

  const cityOrder = ['Adelaide', 'Melbourne', 'Sydney', 'Brisbane'];
  cityOrder.forEach(city => {
    if (!cityGroups[city] || (cityGroups[city].upcoming.length === 0 && cityGroups[city].past.length === 0)) return;

    const groupDiv = document.createElement('div');
    groupDiv.className = `city-group city-${city}`;

    const header = document.createElement('div');
    header.className = 'city-header';
    header.innerHTML = `
      <span class="city-dot"></span>
      <span class="city-name">${city}</span>
    `;
    groupDiv.appendChild(header);

    [...cityGroups[city].upcoming, ...cityGroups[city].past].forEach(td => {
      const venue = td.Venue && td.Venue[0] ? venueMap[td.Venue[0].id] : null;
      const types = td.Type || [];
      const firstType = types[0]?.value || 'Show';
      const isMuted = types.some(t => t.value === 'Rehearsal' || t.value === 'Travel');
      const showDate = new Date(td.Date);
      showDate.setHours(0, 0, 0, 0);
      const isPastDate = showDate < today;

      const card = document.createElement('div');
      card.className = `show-card city-${city}${isMuted || isPastDate ? ' type-muted' : ''}`;
      card.onclick = function() { toggleCard(this); };

      const headerDiv = document.createElement('div');
      headerDiv.className = 'show-card-header';
      headerDiv.innerHTML = `
        <div class="show-date">${formatDate(td.Date)}</div>
        <div class="show-main">
          <div class="show-name">${td.Name}</div>
          <div class="show-meta">
            <span class="pill">${firstType}</span>
            ${venue ? `<span class="pill pill-city">${venue.name}</span>` : ''}
          </div>
        </div>
        <span class="show-chevron">›</span>
      `;

      const tapHint = document.createElement('div');
      tapHint.className = 'show-tap-hint';
      tapHint.textContent = 'tap for details';

      const detailDiv = document.createElement('div');
      detailDiv.className = 'show-detail';

      const timesGrid = document.createElement('div');
      timesGrid.className = 'times-grid';
      timesGrid.innerHTML = [
        renderTimeCell('Load-in', td['Load-in']),
        renderTimeCell('Soundcheck', td.Soundcheck),
        renderTimeCell('Doors', td.Doors),
        renderTimeCell('Set time', td['Set time'])
      ].join('');
      detailDiv.appendChild(timesGrid);

      if (venue) {
        const venueSection = document.createElement('div');
        venueSection.className = 'detail-section';
        venueSection.innerHTML = `
          <div class="detail-label">Venue</div>
          <div class="detail-value">
            ${venue.name}${venue.address ? '<br>' + venue.address : ''}
          </div>
          ${venue.mapsLink ? `<a class="map-link" href="${venue.mapsLink}" target="_blank">↗ Open in Maps</a>` : ''}
        `;
        detailDiv.appendChild(venueSection);
      }

      if (td['Support acts']) {
        const supportsSection = document.createElement('div');
        supportsSection.className = 'detail-section';
        supportsSection.innerHTML = `
          <div class="detail-label">Supports</div>
          <div class="supports-list">${td['Support acts']}</div>
        `;
        detailDiv.appendChild(supportsSection);
      }

      if (td.Curfew) {
        const curfewSection = document.createElement('div');
        curfewSection.className = 'detail-section';
        curfewSection.innerHTML = `
          <div class="detail-label">Curfew</div>
          <div class="detail-value">${td.Curfew}</div>
        `;
        detailDiv.appendChild(curfewSection);
      }

      if (td['Bus call']) {
        const busSection = document.createElement('div');
        busSection.className = 'detail-section';
        busSection.innerHTML = `
          <div class="detail-label">Bus call</div>
          <div class="detail-value">${td['Bus call']}</div>
        `;
        detailDiv.appendChild(busSection);
      }

      if (td['Lobby call']) {
        const lobbySection = document.createElement('div');
        lobbySection.className = 'detail-section';
        lobbySection.innerHTML = `
          <div class="detail-label">Lobby call</div>
          <div class="detail-value">${td['Lobby call']}</div>
        `;
        detailDiv.appendChild(lobbySection);
      }

      if (td.Notes) {
        const notesSection = document.createElement('div');
        notesSection.className = 'detail-section';
        notesSection.innerHTML = `
          <div class="detail-label">Notes</div>
          <div class="detail-value">${td.Notes}</div>
        `;
        detailDiv.appendChild(notesSection);
      }

      card.appendChild(headerDiv);
      card.appendChild(tapHint);
      card.appendChild(detailDiv);
      groupDiv.appendChild(card);
    });

    showsContainer.appendChild(groupDiv);
  });

  // ── RENDER CONTACTS ──
  const contactsContainer = document.getElementById('contacts-container');
  const contactsLoading = document.getElementById('contacts-loading');

  console.log('People data received:', people.length, 'items');
  console.log('People sample:', people.slice(0, 3).map(p => ({ id: p.id, name: p.Name, type: p.Type })));

  if (!people || people.length === 0) {
    contactsLoading.textContent = 'No contacts available.';
    return;
  }

  contactsLoading.remove();

  const bandMembers = people.filter(p => p.Type && p.Type.value === 'Band');
  const crewMembers = people.filter(p => p.Type && p.Type.value === 'Crew');

  console.log('Band members:', bandMembers.length, 'Crew members:', crewMembers.length);

  if (bandMembers.length === 0 && crewMembers.length === 0) {
    const emptyMsg = document.createElement('div');
    emptyMsg.className = 'cal-loading';
    emptyMsg.style.margin = '40px 0';
    emptyMsg.textContent = 'No contacts available';
    contactsContainer.appendChild(emptyMsg);
    return;
  }

  function renderContactSection(title, items) {
    if (items.length === 0) return;

    const titleEl = document.createElement('div');
    titleEl.className = 'section-title';
    titleEl.textContent = title;
    contactsContainer.appendChild(titleEl);

    const wrap = document.createElement('div');
    wrap.className = 'contacts-wrap';
    wrap.style.paddingTop = '0';

    items.forEach(item => {
      const city = item['Base city'] || '';
      const cityColors = getCityColorVars(city);
      const cityCode = city.substring(0, 3).toUpperCase();

      const hasContact = item.Phone || item.Email;
      const card = document.createElement('div');
      card.className = 'contact-card';
      if (!hasContact) card.style.cursor = 'default';
      if (hasContact) card.onclick = function() { toggleContact(this); };

      const headerDiv = document.createElement('div');
      headerDiv.className = 'contact-card-header';
      headerDiv.innerHTML = `
        <div class="contact-avatar"
             style="background:${cityColors.cbg};border-color:${cityColors.c};color:${cityColors.c};font-size:9px">
          ${cityCode}
        </div>
        <div class="contact-info">
          <div class="contact-name">${item.Name}</div>
          <div class="contact-role">${item.Role}</div>
        </div>
        ${hasContact ? '<span class="contact-chevron">›</span>' : ''}
      `;

      card.appendChild(headerDiv);

      if (hasContact) {
        const detailDiv = document.createElement('div');
        detailDiv.className = 'contact-detail';
        const linksDiv = document.createElement('div');
        linksDiv.className = 'contact-links';

        if (item.Phone) {
          const phoneLink = document.createElement('a');
          phoneLink.className = 'contact-link';
          phoneLink.href = `tel:${item.Phone.replace(/\s/g, '')}`;
          phoneLink.textContent = item.Phone;
          linksDiv.appendChild(phoneLink);
        }

        if (item.Email) {
          const emailLink = document.createElement('a');
          emailLink.className = 'contact-link';
          emailLink.href = `mailto:${item.Email}`;
          emailLink.textContent = item.Email;
          linksDiv.appendChild(emailLink);
        }

        detailDiv.appendChild(linksDiv);
        card.appendChild(detailDiv);
      }

      wrap.appendChild(card);
    });

    contactsContainer.appendChild(wrap);
  }

  renderContactSection('Band', bandMembers);
  renderContactSection('Crew', crewMembers);

  const usedVenueIds = new Set();
  tourDays.forEach(td => {
    if (td.Venue && td.Venue[0]) usedVenueIds.add(td.Venue[0].id);
  });

  const usedVenues = venues.filter(v => usedVenueIds.has(v.id));

  if (usedVenues.length > 0) {
    const titleEl = document.createElement('div');
    titleEl.className = 'section-title';
    titleEl.textContent = 'Venues';
    contactsContainer.appendChild(titleEl);

    const wrap = document.createElement('div');
    wrap.className = 'contacts-wrap';
    wrap.style.paddingTop = '0';

    usedVenues.forEach(venue => {
      const city = venueCityMap[venue.id] || '';
      const cityColors = getCityColorVars(city);
      const cityCode = city.substring(0, 3).toUpperCase();

      const hasContact =
        venue['Production contact name'] ||
        venue['Production contact phone'] ||
        venue['Production contact email'];

      const card = document.createElement('div');
      card.className = 'contact-card';
      if (!hasContact) card.style.cursor = 'default';
      if (hasContact) card.onclick = function() { toggleContact(this); };

      const headerDiv = document.createElement('div');
      headerDiv.className = 'contact-card-header';
      headerDiv.innerHTML = `
        <div class="contact-avatar"
             style="background:${cityColors.cbg};border-color:${cityColors.c};color:${cityColors.c};font-size:9px">
          ${cityCode}
        </div>
        <div class="contact-info">
          <div class="contact-name">${venue.Name}</div>
          <div class="contact-role">${venue.Address || ''}</div>
        </div>
        ${hasContact ? '<span class="contact-chevron">›</span>' : ''}
      `;

      card.appendChild(headerDiv);

      if (hasContact) {
        const detailDiv = document.createElement('div');
        detailDiv.className = 'contact-detail';
        const linksDiv = document.createElement('div');
        linksDiv.className = 'contact-links';

        if (venue['Production contact name'] && venue['Production contact phone']) {
          const phoneLink = document.createElement('a');
          phoneLink.className = 'contact-link';
          phoneLink.href = `tel:${venue['Production contact phone'].replace(/\s/g, '')}`;
          phoneLink.textContent = `${venue['Production contact name']}: ${venue['Production contact phone']}`;
          linksDiv.appendChild(phoneLink);
        }

        if (venue['Production contact email']) {
          const emailLink = document.createElement('a');
          emailLink.className = 'contact-link';
          emailLink.href = `mailto:${venue['Production contact email']}`;
          emailLink.textContent = venue['Production contact email'];
          linksDiv.appendChild(emailLink);
        }

        detailDiv.appendChild(linksDiv);
        card.appendChild(detailDiv);
      }

      wrap.appendChild(card);
    });

    contactsContainer.appendChild(wrap);
  }
}

// Load Shows and Contacts on page load
loadShowsAndContacts();
</script>
</body>
</html>
